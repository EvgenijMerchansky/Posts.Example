services:
  posts-api:
    container_name: posts-example-api
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    env_file:
      - ./posts-api.env
    depends_on:
      - sqlserver

  sqlserver:
    container_name: posts-example-sqlserver
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
    env_file:
      - ./sqlserver.env
    ports:
      - "1434:1433"
    volumes:
      - posts_sqlserver_data:/var/opt/mssql

volumes:
  posts_sqlserver_data:
